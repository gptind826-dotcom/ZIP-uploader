<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Music Bot Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body { background:#0f0f13; color:#e8e8ee; height:100vh; display:flex; align-items:center; justify-content:center; }
  .card { background:#1a1a22; border:none; box-shadow:0 0 20px rgba(0,0,0,.6); }
  .form-control { background:#252530; border:#2d2d3a; color:#fff; }
  .form-control:focus { background:#2a2a38; border-color:#6c63ff; color:#fff; box-shadow:0 0 0 .2rem rgba(108,99,255,.25); }
  .btn-primary { background:#6c63ff; border:none; }
  .btn-primary:hover { background:#5a52d5; }
</style>
</head>
<body>
<div class="container" style="max-width:420px;">
  <div class="card p-4">
    <h3 class="mb-3 text-center">🔐 Admin Login</h3>
    {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
    <form method="POST" action="/login">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Sign In</button>
    </form>
    <div class="mt-3 text-center text-muted small">Developed by @EXUCODR</div>
  </div>
</div>
</body>
</html>
